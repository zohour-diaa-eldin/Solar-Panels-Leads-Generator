services:
  db:
    image: postgis/postgis:16-3.4
    container_name: solar-lead-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solar_leads}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-solar_leads}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: solar-lead-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-solar_leads}
      GOOGLE_SOLAR_API_KEY: ${GOOGLE_SOLAR_API_KEY:-}
      OVERPASS_URL: ${OVERPASS_URL:-https://overpass-api.de/api/interpreter}
      OVERPASS_FALLBACK_URLS: ${OVERPASS_FALLBACK_URLS:-https://overpass.osm.ch/api/interpreter,https://overpass.kumi.systems/api/interpreter}
      OSM_MAP_API_URL: ${OSM_MAP_API_URL:-https://api.openstreetmap.org/api/0.6/map}
      PVGIS_URL: ${PVGIS_URL:-https://re.jrc.ec.europa.eu/api/v5_3/PVcalc}
      OPEN_METEO_ARCHIVE_URL: ${OPEN_METEO_ARCHIVE_URL:-https://archive-api.open-meteo.com/v1/archive}
      EXTERNAL_API_TIMEOUT_SECONDS: ${EXTERNAL_API_TIMEOUT_SECONDS:-18}
      FRANCE_WEATHER_YEAR: ${FRANCE_WEATHER_YEAR:-2025}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DEFAULT_ANALYSIS_LIMIT: ${DEFAULT_ANALYSIS_LIMIT:-220}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: solar-lead-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
